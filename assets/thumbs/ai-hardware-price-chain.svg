<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans CJK SC,PingFang SC,sans-serif" style="width:100%;height:auto">
<title>
800V HVDC 价值转移图
</title>
<desc>800V 高压直流供电架构降低机架电流，省下铜的价值转移到功率半导体、被动件和 PCB/CCL 三个环节；下方对照光模块（已定价）与功率+被动件（未定价）。</desc> <g><rect x="190" y="20" width="300" height="64" rx="4" fill="#EEEDFE" stroke="#AFA9EC"/><text font-size="16" font-weight="600" fill="#443B9E" x="340" y="46" text-anchor="middle">800V 高压直流供电（HVDC）</text><text font-size="13" fill="#534AB7" x="340" y="68" text-anchor="middle">机架电流降 16.7 倍 · 铜用量省 45%</text></g> <path d="M340 84 V104" stroke="#666" stroke-width="1.4" fill="none"/> <path d="M136 104 H544" stroke="#666" stroke-width="1.4" fill="none"/> <path d="M136 104 V124" stroke="#666" stroke-width="1.4" fill="none"/> <path d="M340 104 V124" stroke="#666" stroke-width="1.4" fill="none"/> <path d="M544 104 V124" stroke="#666" stroke-width="1.4" fill="none"/> <path d="M132 124 L136 134 L140 124 Z" fill="#666"/> <path d="M336 124 L340 134 L344 124 Z" fill="#666"/> <path d="M540 124 L544 134 L548 124 Z" fill="#666"/> <g><rect x="40" y="134" width="192" height="70" rx="4" fill="#E1F5EE" stroke="#5DCAA5"/><text font-size="16" font-weight="600" fill="#085041" x="136" y="164" text-anchor="middle">功率半导体</text><text font-size="13" fill="#0F6E56" x="136" y="186" text-anchor="middle">单机架价值逐代跳 17 倍</text></g> <g><rect x="244" y="134" width="192" height="70" rx="4" fill="#E1F5EE" stroke="#5DCAA5"/><text font-size="16" font-weight="600" fill="#085041" x="340" y="164" text-anchor="middle">被动件</text><text font-size="13" fill="#0F6E56" x="340" y="186" text-anchor="middle">MLCC 单柜价值 +182%</text></g> <g><rect x="448" y="134" width="192" height="70" rx="4" fill="#E1F5EE" stroke="#5DCAA5"/><text font-size="16" font-weight="600" fill="#085041" x="544" y="164" text-anchor="middle">PCB / CCL</text><text font-size="13" fill="#0F6E56" x="544" y="186" text-anchor="middle">CCL 价格创 26 年新高</text></g> <text font-size="13" fill="#666" x="340" y="236" text-anchor="middle">市场定价状态对照（文章观点）</text> <g><rect x="110" y="248" width="210" height="52" rx="4" fill="#F1EFE8" stroke="#B4B2A9"/><text font-size="16" font-weight="600" fill="#444" x="215" y="270" text-anchor="middle">光模块</text><text font-size="13" fill="#666" x="215" y="290" text-anchor="middle">已定价 · 拥挤交易</text></g> <g><rect x="360" y="248" width="210" height="52" rx="4" fill="#E1F5EE" stroke="#5DCAA5"/><text font-size="16" font-weight="600" fill="#085041" x="465" y="270" text-anchor="middle">功率 + 被动件</text><text font-size="13" fill="#0F6E56" x="465" y="290" text-anchor="middle">未定价的二阶机会</text></g>
</svg>