<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Noto Sans CJK SC,PingFang SC,sans-serif" style="width:100%;height:auto">
<title>
预训练与后训练对比示意图
</title>
<desc>用培养大厨类比：预训练是海量阅读打基础，后训练是餐厅学徒学规矩，两阶段依次衔接产出可用的AI助手。</desc> <rect x="30" y="50" width="300" height="270" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1.5"/> <text x="180" y="86" text-anchor="middle" fill="#134A80" font-size="19" font-weight="700">阶段一 · 预训练</text> <text x="180" y="111" text-anchor="middle" fill="#185FA5" font-size="13">Pre-training「读万卷书」</text> <text x="55" y="150" fill="#222" font-size="13.5">吃进几乎整个互联网的文本</text> <text x="55" y="180" fill="#222" font-size="13.5">任务只有一个：猜下一个词</text> <text x="55" y="210" fill="#222" font-size="13.5">学会语言 + 世界知识 + 推理雏形</text> <text x="55" y="240" fill="#185FA5" font-size="12.5">成本：数月、上万块GPU、烧掉大头</text> <text x="55" y="270" fill="#185FA5" font-size="12.5">产出：博学但不会「接客」的毛坯模型</text> <text x="180" y="303" text-anchor="middle" fill="#185FA5" font-size="12" font-style="italic">类比：从小背下全世界菜谱的天才</text> <line x1="332" y1="185" x2="358" y2="185" stroke="#666" stroke-width="1.4"/> <path d="M 358 181 L 368 185 L 358 189 Z" fill="#666"/> <rect x="370" y="50" width="300" height="270" rx="10" fill="#EAF3DE" stroke="#97C459" stroke-width="1.5"/> <text x="520" y="86" text-anchor="middle" fill="#2F5A0F" font-size="19" font-weight="700">阶段二 · 后训练</text> <text x="520" y="111" text-anchor="middle" fill="#3B6D11" font-size="13">Post-training「学做人做事」</text> <text x="395" y="150" fill="#222" font-size="13.5">SFT：看人类示范学「好答案」</text> <text x="395" y="180" fill="#222" font-size="13.5">RLHF/RL：按反馈奖惩，越练越顺手</text> <text x="395" y="210" fill="#222" font-size="13.5">学会听懂指令、守规矩、会用工具</text> <text x="395" y="240" fill="#3B6D11" font-size="12.5">成本：远低于预训练，但迭代最频繁</text> <text x="395" y="270" fill="#3B6D11" font-size="12.5">产出：能上岗接单的AI助手</text> <text x="520" y="303" text-anchor="middle" fill="#3B6D11" font-size="12" font-style="italic">类比：进餐厅当学徒，学接待与摆盘</text> <line x1="180" y1="330" x2="180" y2="360" stroke="#999" stroke-width="1.5"/> <line x1="520" y1="330" x2="520" y2="360" stroke="#999" stroke-width="1.5"/> <line x1="180" y1="360" x2="520" y2="360" stroke="#999" stroke-width="1.5"/> <line x1="350" y1="360" x2="350" y2="385" stroke="#999" stroke-width="1.5"/> <text x="350" y="408" text-anchor="middle" fill="#222" font-size="14.5" font-weight="600">底子决定上限：菜谱没背够的学徒，再怎么教礼仪也做不出好菜</text>
</svg>