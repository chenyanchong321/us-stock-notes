<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Noto Sans CJK SC,PingFang SC,sans-serif" style="width:100%;height:auto">
<title>
EQT 报告 AI 需求逻辑链
</title>
<desc>四步逻辑链：AI 数据中心要电，其他电源接不上，天然气成唯一快解，EQT 卡位最好，结论是需求被长约托底。</desc> <rect x="140" y="16" width="420" height="58" rx="8" fill="#F1EFE8" stroke="#B4B2A9"/> <text x="350" y="40" text-anchor="middle" font-size="15" font-weight="600" fill="#444">第1步 · AI 数据中心要电</text> <text x="350" y="61" text-anchor="middle" font-size="12.5" fill="#666">EQT 产区已有 12 GW 在建，占全美 27%</text> <path d="M350 78 L350 94" stroke="#666" stroke-width="1.4" fill="none"/><path d="M346 94 L350 104 L354 94 Z" fill="#666"/> <rect x="140" y="106" width="420" height="58" rx="8" fill="#F1EFE8" stroke="#B4B2A9"/> <text x="350" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#444">第2步 · 其他电源接不上</text> <text x="350" y="151" text-anchor="middle" font-size="12.5" fill="#666">电网年增仅 2-3% · 核电要 7-10 年 · 风光不稳定</text> <path d="M350 168 L350 184" stroke="#666" stroke-width="1.4" fill="none"/><path d="M346 184 L350 194 L354 184 Z" fill="#666"/> <rect x="140" y="196" width="420" height="58" rx="8" fill="#F1EFE8" stroke="#B4B2A9"/> <text x="350" y="220" text-anchor="middle" font-size="15" font-weight="600" fill="#444">第3步 · 天然气成唯一快解</text> <text x="350" y="241" text-anchor="middle" font-size="12.5" fill="#666">够大 · 够快 · 可调度</text> <path d="M350 258 L350 274" stroke="#666" stroke-width="1.4" fill="none"/><path d="M346 274 L350 284 L354 274 Z" fill="#666"/> <rect x="140" y="286" width="420" height="58" rx="8" fill="#E6F1FB" stroke="#85B7EB"/> <text x="350" y="310" text-anchor="middle" font-size="15" font-weight="600" fill="#134A80">第4步 · EQT 卡位最好</text> <text x="350" y="331" text-anchor="middle" font-size="12.5" fill="#185FA5">气源 + 自有管道 + 数据中心走廊，三者重合</text> <path d="M350 348 L350 364" stroke="#666" stroke-width="1.4" fill="none"/><path d="M346 364 L350 374 L354 364 Z" fill="#666"/> <rect x="140" y="376" width="420" height="58" rx="8" fill="#EAF3DE" stroke="#97C459"/> <text x="350" y="400" text-anchor="middle" font-size="15" font-weight="600" fill="#2F5A0F">结论 · 需求被长约托底</text> <text x="350" y="421" text-anchor="middle" font-size="12.5" fill="#3B6D11">15-25 年 take-or-pay 合同 → 下行被压到 -12%</text>
</svg>