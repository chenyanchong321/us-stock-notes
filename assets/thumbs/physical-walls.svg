<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Noto Sans CJK SC,PingFang SC,sans-serif" style="width:100%;height:auto">
<title>
三种化合物半导体材料的分工地图
</title>
<desc>磷化铟走光赛道用于光模块激光器，碳化硅与氮化镓走电赛道分别负责高压与中低压功率</desc> <rect x="40" y="24" width="180" height="66" rx="4" fill="#F1EFE8" stroke="#B4B2A9"/> <text x="130" y="52" text-anchor="middle" font-size="16" font-weight="600" fill="#444">磷化铟 InP</text> <text x="130" y="74" text-anchor="middle" font-size="13" fill="#666">直接带隙 · 会发光</text> <rect x="260" y="24" width="180" height="66" rx="4" fill="#F1EFE8" stroke="#B4B2A9"/> <text x="350" y="52" text-anchor="middle" font-size="16" font-weight="600" fill="#444">氮化镓 GaN</text> <text x="350" y="74" text-anchor="middle" font-size="13" fill="#666">宽禁带 · 高频敏捷</text> <rect x="480" y="24" width="180" height="66" rx="4" fill="#F1EFE8" stroke="#B4B2A9"/> <text x="570" y="52" text-anchor="middle" font-size="16" font-weight="600" fill="#444">碳化硅 SiC</text> <text x="570" y="74" text-anchor="middle" font-size="13" fill="#666">宽禁带 · 扛高压</text> <line x1="130" y1="90" x2="130" y2="166" stroke="#666" stroke-width="1.4"/> <path d="M 126 166 L 130 176 L 134 166 Z" fill="#666"/> <path d="M 350 90 L 350 130 L 290 130 L 290 166" fill="none" stroke="#666" stroke-width="1.4"/> <path d="M 286 166 L 290 176 L 294 166 Z" fill="#666"/> <path d="M 570 90 L 570 130 L 500 130 L 500 166" fill="none" stroke="#666" stroke-width="1.4"/> <path d="M 496 166 L 500 176 L 504 166 Z" fill="#666"/> <text x="105" y="135" font-size="12.5" fill="#666">当激光器</text> <text x="332" y="122" font-size="12.5" fill="#666">中低压·高频</text> <text x="548" y="122" font-size="12.5" fill="#666">中高压·主干</text> <rect x="40" y="176" width="200" height="150" rx="4" fill="#E1F5EE" stroke="#5DCAA5"/> <text x="140" y="204" text-anchor="middle" font-size="15" font-weight="600" fill="#085041">光赛道：光模块 / CPO</text> <text x="140" y="230" text-anchor="middle" font-size="13" fill="#0F6E56">激光器·探测器的心脏</text> <text x="140" y="252" text-anchor="middle" font-size="13" fill="#0F6E56">CPO=封装方式，光源仍是InP</text> <text x="140" y="282" text-anchor="middle" font-size="13" fill="#0F6E56">AXTI · LITE · COHR</text> <text x="140" y="302" text-anchor="middle" font-size="13" fill="#0F6E56">源杰科技 · 曦智</text> <rect x="260" y="176" width="400" height="150" rx="4" fill="#FAECE7" stroke="#F0997B"/> <text x="460" y="204" text-anchor="middle" font-size="15" font-weight="600" fill="#712B13">电赛道：800VDC 功率半导体</text> <text x="368" y="234" text-anchor="middle" font-size="13" fill="#993C1D">GaN：快充 / DC-DC 前级</text> <text x="368" y="256" text-anchor="middle" font-size="13" fill="#993C1D">纳微 · 英诺赛科</text> <text x="556" y="234" text-anchor="middle" font-size="13" fill="#993C1D">SiC：高压主干 / 电车逆变器</text> <text x="556" y="256" text-anchor="middle" font-size="13" fill="#993C1D">天岳 · 意法 · 英飞凌 · 罗姆</text> <line x1="462" y1="222" x2="462" y2="284" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3"/> <text x="460" y="302" text-anchor="middle" font-size="13" fill="#993C1D">两者按电压段分工，互为补充</text> <text x="350" y="368" text-anchor="middle" font-size="12.5" fill="#666">GaN 也会发蓝光（LED，三安光电），但不是光纤通信波段，所以不进光模块</text>
</svg>