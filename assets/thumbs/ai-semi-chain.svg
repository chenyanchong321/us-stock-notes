<svg viewBox="0 0 680 356" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg" font-family="Noto Sans CJK SC,PingFang SC,sans-serif">
<text x="200" y="42" text-anchor="middle" font-size="17" font-weight="600" fill="#222">大池塘 · 主流市场</text> <text x="550" y="42" text-anchor="middle" font-size="17" font-weight="600" fill="#222">小水洼 · 利基市场</text> <rect x="30" y="58" width="340" height="238" rx="12" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/> <text x="200" y="90" text-anchor="middle" font-size="13.5" fill="#185FA5">标准DRAM / 标准NAND，几千亿美元</text> <rect x="46" y="112" width="96" height="38" rx="4" fill="#FFFFFF" stroke="#8FA8C0"/> <text x="94" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#222">三星</text> <rect x="152" y="112" width="96" height="38" rx="4" fill="#FFFFFF" stroke="#8FA8C0"/> <text x="200" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#222">SK海力士</text> <rect x="258" y="112" width="96" height="38" rx="4" fill="#FFFFFF" stroke="#8FA8C0"/> <text x="306" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#222">美光</text> <text x="200" y="196" text-anchor="middle" font-size="13.5" fill="#185FA5">三巨头吃掉全球九成以上份额</text> <text x="200" y="222" text-anchor="middle" font-size="13.5" fill="#185FA5">拼产能、拼制程、拼价格</text> <text x="200" y="248" text-anchor="middle" font-size="13.5" fill="#185FA5">小公司进去就是炮灰</text> <text x="409" y="162" text-anchor="middle" font-size="13" fill="#666">看不上</text> <line x1="376" y1="177" x2="436" y2="177" stroke="#666" stroke-width="1.4" stroke-dasharray="5 4"/> <path d="M436 173 L446 177 L436 181 Z" fill="#666"/> <rect x="450" y="58" width="200" height="66" rx="8" fill="#EAF3DE" stroke="#97C459"/> <text x="550" y="86" text-anchor="middle" font-size="15.5" font-weight="600" fill="#2F5A0F">NOR Flash</text> <text x="550" y="108" text-anchor="middle" font-size="12.5" fill="#3B6D11">存启动代码，市场小但稳</text> <rect x="450" y="144" width="200" height="66" rx="8" fill="#EAF3DE" stroke="#97C459"/> <text x="550" y="172" text-anchor="middle" font-size="15.5" font-weight="600" fill="#2F5A0F">小容量 DRAM</text> <text x="550" y="194" text-anchor="middle" font-size="12.5" fill="#3B6D11">家电、路由器用，巨头已退出</text> <rect x="450" y="230" width="200" height="66" rx="8" fill="#EAF3DE" stroke="#97C459"/> <text x="550" y="258" text-anchor="middle" font-size="15.5" font-weight="600" fill="#2F5A0F">SLC NAND</text> <text x="550" y="280" text-anchor="middle" font-size="12.5" fill="#3B6D11">工业、车规，要稳不要大</text> <text x="340" y="336" text-anchor="middle" font-size="13.5" fill="#555">利基（niche）＝ 大鱼看不上、小鱼却能当王的小水洼 —— 兆易创新就住在右边</text>
</svg>