name: 每日更新行情数据

on:
  schedule:
    # 收盘后完整跑（UTC 21:30 = 北京 5:30）
    - cron: "30 21 * * *"
    # A股/港股交易时段每30分钟（UTC 1:30-7:30 = 北京 9:30-15:30，工作日）
    - cron: "*/30 1-7 * * 1-5"
    # 美股交易时段每30分钟（UTC 13:30-20:00，工作日）
    - cron: "*/30 13-20 * * 1-5"
  workflow_dispatch: {}   # 支持手动触发

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 拉取行情并计算指标
        run: python scripts/update_quotes.py

      - name: 提交更新
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@github.com"
          git add data/quotes.json
          git diff --cached --quiet || git commit -m "chore: 更新行情数据 $(date -u +%F)"
          git pull --rebase origin main
          git push
