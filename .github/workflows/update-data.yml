name: 每日更新行情数据

on:
  schedule:
    # UTC 21:30 = 北京时间早上 5:30（美股收盘后）
    - cron: "30 21 * * *"
  workflow_dispatch: {}   # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 拉取行情并计算指标
        run: python scripts/update_quotes.py

      - name: 提交更新
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@github.com"
          git add data/quotes.json
          git diff --cached --quiet || git commit -m "chore: 更新行情数据 $(date -u +%F)"
          git push
