name: probe-em
on: workflow_dispatch
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: probe eastmoney
        run: |
          set +e
          curl -s -m 25 -w "HTTP:%{http_code} t:%{time_total}\n" -o /tmp/k.json "https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=225.lcm&klt=101&fqt=0&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&beg=20260701&end=20500101" > /tmp/kh.txt 2>&1
          curl -s -m 25 -w "HTTP:%{http_code} t:%{time_total}\n" -o /tmp/s.json "https://push2.eastmoney.com/api/qt/stock/get?secid=225.lcm&fields=f43,f57,f58,f59,f60,f169,f170" > /tmp/sh.txt 2>&1
          { echo "=== kline ==="; cat /tmp/kh.txt; head -c 600 /tmp/k.json; echo; echo "=== snap ==="; cat /tmp/sh.txt; head -c 600 /tmp/s.json; echo; } > probe_em.txt
          cat probe_em.txt
      - name: commit
        run: |
          git config user.name probe-bot
          git config user.email probe@bot
          git add probe_em.txt
          git commit -m "probe result" || echo nochange
          git push
