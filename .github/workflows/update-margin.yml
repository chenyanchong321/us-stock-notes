# A股两融余额每日更新（2026-07-20）：交易日盘后拉取，写 data/margin.json
name: 更新融资余额
on:
  schedule:
    - cron: "37 9 * * 1-5"    # UTC 9:37 = 北京 17:37 盘后（:37错峰防跳班）
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["scripts/update_margin.py"]
concurrency:
  group: update-margin
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 抓取
        run: python scripts/update_margin.py
      - name: 提交
        run: |
          git config user.name "margin-bot"
          git config user.email "margin-bot@users.noreply.github.com"
          git add data/margin.json
          if git diff --cached --quiet; then echo "无变化"; exit 0; fi
          git commit -m "data: 两融余额更新"
          git pull --rebase origin main
          git push origin main
